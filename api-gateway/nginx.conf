server {
    listen 80;

    # CORS Headers (Biztonsági tartalék, bár a FastAPI is kezeli)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Irányítások a mikroszolgáltatásokhoz
    location /api/v1/extract {
        proxy_pass http://wellspring:8000;
    }
    location /api/v1/chunk {
        proxy_pass http://runecarver:8000;
    }
    location /api/v1/ingest {
        proxy_pass http://bifrost:8000;
    }
    location /api/v1/search {
        proxy_pass http://bifrost:8000;
    }
    location /api/v1/generate {
        proxy_pass http://bifrost:8000;
    }
    location /api/v1/export {
        proxy_pass http://skald:8000;
    }
}